name: agentcrdt
description: "Semantic-causal CRDT for agent-mutable world state"
inputs:
  db:
    description: "Path to the agentcrdt database"
    required: false
    default: "agentcrdt.db"
  command:
    description: "agentcrdt command to run (status, events)"
    required: false
    default: "status"
runs:
  using: "composite"
  steps:
    - name: Install agentcrdt
      shell: bash
      run: pip install -e "${{ github.action_path }}"
    - name: Run agentcrdt
      shell: bash
      run: |
        agentcrdt --db ${{ inputs.db }} ${{ inputs.command }}
